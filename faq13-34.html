<FONT SIZE="5" COLOR="#000000">ユーザーアカウントの追加・削除・変更やエイリアスの追加・削除をコマンド操作で行えますか？</FONT>
<HR>
<br>
アカウントの追加・削除やパスワードの変更、エイリアスの追加・削除などの操作がコマンド操作で可能です。<br>
標準装備されているE-POSTコントロールセンターのメールサーバ管理（Web管理CGI）のプログラムファイル epstman をコンソールから引数付きで実行することにより、コマンドベースでアカウント登録・削除などの操作が可能です。<br>
<br>
コマンドの事例や使い方に関しては、『E-Post Mail Server コンソール用管理ツール マニュアル』（PDF）をご覧ください。<br>
