<FONT SIZE="4" COLOR="#000000"><b>メールデータを残したまま使用しなくなったアカウントを停止したい </b></FONT>
<HR>
<br>
メールデータをメールボックスフォルダに一定期間残したまま、使用しなくなったアカウントを停止したい場合、E-POST コントロールセンター（メールサーバ管理）の［ユーザ管理］でのアカウント削除の際、表示されるオプション指定で「使用していたメールボックス」を「残す」選択をしてアカウント削除を行ってください。<br>
<br>
ユーザーアカウントが存在しなくなることで、外部からの着信はできなくなり、user unknown となります。また該当ユーザーアカウントを設定していたメールクライアントからの送信、およびPOP3受信もできなくなります。<br>
