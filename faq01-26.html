<FONT SIZE="4" COLOR="#000000"><b>メーリングリストから内部ユーザー宛の送信で再転送できない</b></FONT>
<HR>
<br>
E-Post Mail Serverシリーズでは、送信元エンベロープが管理者アカウントの場合は、<b>エラーメールの永久ループを防ぐため</b>、自動転送ができないようにしてあります。管理者アカウントになっているアカウントは、仕様で自動転送が禁止されます。<br>
<br>
このため、メーリングリストの詳細設定の「未送信レポート返信先」で管理者アカウントが指定されている場合は、転送できないことになりますので、「送信者」もしくは、「送信者を指定」とし、管理者アカウント以外の任意のメールアドレスを指定するようにしてください。<br>
