<FONT SIZE="5" COLOR="#000000"><b>SMTP AUTH有効時のログインユーザーIDについて</b></FONT>
<HR>
<br>
E-Post Mail Server / E-Post SMTP Serverシリーズでは、SMTP AUTH有効時のログインユーザーIDについて、以下の順位でログインユーザーIDをマッチングします。優先順位は違いますが、最終的にはどちらのログイン方法でも通すことになっています。<br>
<br>
１．「ユーザー名＠ドメイン名」のログインを優先<br>
２．「ユーザー名」のみのログインを次点<br>
