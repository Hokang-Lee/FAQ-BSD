<FONT SIZE="5" COLOR="#000000"><b>電子署名が付いたメールが表示できない場合</b></FONT>
<HR>
<BR>
メールに電子署名が付いたメールが以下の設定が行われていないか確認してください。<br>
<ul>
<li>ユーザー単位での転送指定（自動転送設定）で「添付ファイルは削除する」をチェックしていないか？
<li>メーリングリスト設定の「添付ファイルは削除する」をチェックしていないか？
</ul>
電子署名はメールデータの中では、MIME形式の添付ファイルであるため、上記設定で添付削除の指定を行うと、電子署名も添付ファイルとして削除されてしまいます。<BR>
