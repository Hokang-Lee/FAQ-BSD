<FONT SIZE="5" COLOR="#000000">POP3およびIMAP4に対応していますか？ </FONT>
<HR>
<br>
対応しています。<br>
<br>
E-Post Mail Server V シリーズ製品では、POP3およびIMAP4の両プロトコルを併用、２つのサービスを動作させておくことが可能です。<br>
あるいは、POP3またはIMAP4のどちらかのプロトコルを使用し、片方のプロトコルを使わない設定にすることも可能です。<br>
