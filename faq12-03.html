<FONT SIZE="5" COLOR="#000000">製品評価版を試験評価した後、そのまま正式運用に移行できますか？</FONT>
<HR>
<br>
ソフトウェアとしての製品評価版を30日の期限内で試験評価した後、試験評価中のメールサーバ・SMTPサーバをそのまま正式運用に移行することは可能です。<br>
<br>
具体的にはオンラインでのライセンスキー登録を行う画面で、ご購入された製品に添付しているライセンスキーを入力していただくことで、30日の期限が解除され、正式版としてそのまま稼働を開始します。評価版との機能的な違いはありません。<br>
