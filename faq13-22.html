<FONT SIZE="5" COLOR="#000000">どの程度の大量配送が可能ですか？ </FONT>
<HR>
<br>
E-Post V シリーズのシングルサーバ版では、理論値30万通／時の大量配送が可能です。ただネットワーク回線の混雑やDNSサーバの負荷など、運用環境によって数値は大きく左右しますので、あくまで参考値にしてください。<br>
