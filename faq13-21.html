<FONT SIZE="5" COLOR="#000000">ユーザーが自分のパスワード変更したりなど、自己管理させることができますか？</FONT>
<HR>
<br>
ユーザーが、自分のパスワードを変更したり、転送先を指定したりなど、自分で管理ができるようにするためには、E-POSTコントロールセンターのメールサーバ管理のHTMLで記述されたページを修正すれば可能になります。<br>
<br>
メールサーバ管理の画面は、デフォルトで管理者画面になっており、すべての設定が可能になっていますから、ユーザーに扱わせたい必要な項目だけを残してHTMLでのページを編集し作り直しておけば、自分のパスワードを変更したり、転送先を指定するなど、自分で管理させることが可能になります。<br>
