<FONT SIZE="4" COLOR="#000000"><b>メールボックスに格納されるメールデータの形式について</b></FONT>
<HR>
<br>
E-Postシリーズのメールボックスに格納されるメールデータファイルの拡張子は.MSGです。これは実質eml形式です。<br>
メールボックスに格納されたメールデータ.MSGファイルを任意場所にコピーし、拡張子を.MSGから.emlに変えれば、他のツールでそのまま.eml形式ファイルとして活用できます。<br>
なお、設定ファイルを変更することで、デフォルトのメールデータ拡張子を.MSGから別のものへ変えることは可能です。ただし大部分の場合、デフォルト設定である.MSGでの運用がほとんどであり、変更した上での運用報告はほとんどありません。<br>
