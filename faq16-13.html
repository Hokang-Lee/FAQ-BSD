<FONT SIZE="5" COLOR="#000000">上長はどのくらいの承認をしなくてはいけないかを知ることができますか？</FONT>
<HR>
<br>
可能です。<br>
上長自身から承認待ちのリストを能動的に取得する機能があります。上長が件名：「waitlist_」のメールを自分宛に送信します。すると、上長が承認すべき承認待ちリストが上長本人に送られてきます。その承認待ちリストから、「承認」または「却下」の操作が可能です。<br>
