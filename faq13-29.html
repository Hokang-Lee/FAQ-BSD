<FONT SIZE="5" COLOR="#000000">曜日ごとに利用時間を制限する機能はありますか？ </FONT>
<HR>
<br>
E-Post Mail Server V シリーズシリーズ製品では、ユーザーごとに、特定の曜日、特定の時間についてだけ送信と受信の利用を許可する制限機能を持っています。（E-Post SMTP Server V シリーズ製品は、送信のみ）<br>
<br>
利用を許可しない曜日や時間を設定にされたユーザーは、その時間は送信も受信もできずエラーとなります。ただし、メールサーバ上にあるメールボックスには、メールはいつでも受け取られています。<br>
