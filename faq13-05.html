<FONT SIZE="5" COLOR="#000000">特定のマシンやドメインからの中継許可・拒否が可能ですか？ </FONT>
<HR>
<br>
可能です。<br>
<br>
制限機能の基本は、特定のIPアドレスやIPアドレスの範囲を元に設定を行います。特定のIPアドレスからの受信を拒否したり、逆に、特定のIPアドレスからの中継だけを可能にするといった細かな設定が可能です。<br>
<br>
また、送信元エンベロープによる制限も可能です。送信元エンベロープによる制限方法を使えば、ドメイン名による受信拒否を行ったりすることが可能な一方、送信エンベロープが空白だったり、送信エンベロープが&lt;&gtのときに拒否する設定にすることなども可能になります。<br>
