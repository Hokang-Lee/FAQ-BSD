<FONT SIZE="5" COLOR="#000000">中継の制限機能はありますか？ </FONT>
<HR>
<br>
E-Post Mail Serverシリーズ、E-Post SMTP Serverシリーズ製品では、スパムメールや不正中継の踏み台にならない対策をとれるように、中継の制限や受信の制限機能が備わっています。<br>
<br>
既定値では、外部から外部への中継は行わない設定になっています。そのとき、内部アカウントをもっているユーザーは外部からの送信は可能です。もちろん、中継を全面的に許可する設定も可能です。<br>
