<FONT SIZE="5" COLOR="#000000">複数の承認者を設定した場合、最初の承認者が承認した同じメールを次の承認者が却下するとどうなりますか？</FONT>
<HR>
<br>
複数の承認者が並列で設定されているとき、最初の承認者が承認する、または却下すると、その操作が優先されて実行されます。<br>
後から他の承認者が承認操作、または却下操作をした場合、その承認者に対し、「対象の承認処理は既に完了している」旨のメッセージが返されます。<br>
