<FONT SIZE="5" COLOR="#000000"><b>ウイルス発見時の通知メールについて</b></FONT>
<HR>
<br>
アンチウイルス機能を持つwith AntiVirus版では、ウイルス発見時にメールで通知が行えるウイルスチェック通知設定機能があり、メールでの通知が可能ですが、設定を行ってウイルスが発見されたときは次のような通知メールが指定されたアドレスに送られてきます。<br>
<p align="center"><img src="./img/faq01-86.gif"></p>
なお、通知メールには、ウイルスメールのヘッダ情報を抽出したテキストファイルが添付されます。通知を受けたら、ヘッダ情報を参照し、送り主と宛先を確認するための材料にしてください。なお、ウイルスそのものが添付されることはありません。<br>
