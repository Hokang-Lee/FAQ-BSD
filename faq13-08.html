<FONT SIZE="5" COLOR="#000000">エイリアス機能はありますか？ </FONT>
<HR>
<br>
E-Post Mail Server V シリーズ・E-Post SMTP Server V シリーズ製品は、エイリアス機能を持っています。<br>
<br>
ただし、設定できるエイリアスについては、カウント方法にルールがありますので、事前に十分な検討が必要です。実アドレス数とメーリングリスト名、そしてエイリアス数とを合わせた総合計が、ライセンス数におさまるように運用しなくてはなりません。そのため、仮に500人分の実アドレスが必要で、それぞれ1つずつエイリアスを割り当て可能にしようとすると、必要なライセンス数は、倍の1000 User分が必要だということになります。<br>
