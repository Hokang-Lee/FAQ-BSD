<FONT SIZE="5" COLOR="#000000"><b>Enterprise版とStandard版の違いは何ですか？</b></FONT>
<HR>
<br>
Enterprise版は、ファストスキャン版アンチウイルスエンジンが搭載されています。<br>
ただし、アンチウイルスエンジンは、添付ファイルなどメールデータのみに対して行われます。<br>
<br>
それに対して、Standard版はアンチウイルスエンジンは特に搭載されていない製品です。<br>
<br>
