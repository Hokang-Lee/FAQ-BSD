<FONT SIZE="4" COLOR="#000000"><b>ORDBによる制限設定を行っているときORDBの判定を受けないホワイトリストは登録できるか</b></FONT>
<HR>
<br>
ORDBによる制限設定を行っている場合、ORDBの判定を受けないホワイトリストを登録したいときには、「RBL(ORDB)」ボタンの右隣に「RBL(ORDB)検査しないＩＰ」の設定部分で登録します。<br>
接続元のIPを調べておき、その接続元IPを登録しておけば、ORDBへ問い合わせしない動きとなります。<br>
