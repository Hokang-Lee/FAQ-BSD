<FONT SIZE="4" COLOR="#000000"><b>返信時メールにメーリングリストアドレスが反映されない</b></FONT>
<HR>
<br>
メーリングリストへメールを送る時に、メールクライアントが既に Reply-to:ヘッダをつけて送信した場合、E-Postシリーズ製品では、この Reply-to:ヘッダを有効なものとみなし、メーリングリストアドレスへの書き換えは行っていません。メーリングリスト投稿時には Reply-to:ヘッダをつけない設定で送信してください。<br>
<br>
※設定方法は、メールクライアントによって異なりますので、使用するメールクライアントのヘルプやドキュメントを参照してください。<br>
