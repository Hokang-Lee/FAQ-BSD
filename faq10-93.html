<FONT SIZE="5" COLOR="#000000"><b>エイリアスで使えない文字列について</b></FONT>
<HR>
<br>
E-Postシリーズにおいて、エイリアス機能で使用可能な文字列については、アカウントで使用可能な文字と仕様は基本的に同等です。<br>
エイリアスにおいて使用できない文字は、以下の通りです。<br>
<br>
<b>[使用不可キャラクタ]<br>
@ &quot; / \ [ ] ; : | = , + * ? &lt; &gt;</b><br>
<br>
また、また、エイリアスの先頭や末尾に '.'(ピリオド)を使ったアドレス及び、連続したピリオド'..'の扱いについても、アカウントのときと同等になります。<br>
