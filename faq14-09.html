<FONT SIZE="5" COLOR="#000000">メール宛先の人数を意図的に制限する機能はありますか？</FONT>
<HR>
<br>
あります。<br>
<br>
「中継の制限」画面にある「&quot;CC,BCC&quot;同報の受領（制限）」の機能で設定すれば、１メールあたりの配送先アドレス数の制限を行うことができます。<br>
<br>
メールサーバは、送信先レシピエント情報として、TO、CC、BCCをひっくるめて扱いますので、この機能で設定したときは、１メールあたりのTO、CC、BCCで指定された宛先アドレス合計人数が制限されることになります。<br>
<br>
なお、「&quot;CC,BCC&quot;同報の受領（制限）」の既定の設定値は &quot;0&quot; ですが、この状態ではメールサーバ側での制限は特に設けられていません。<br>
