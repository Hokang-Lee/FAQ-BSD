<FONT SIZE="5" COLOR="#000000">複数のドメインを運用できますか？ </FONT>
<HR>
<br>
１台のE-Post Mail Server V シリーズ・E-Post SMTP Server V シリーズ製品は、複数のドメインをいっしょに運用することが可能です。＠から左側が同じアカウントになっても、異なるドメイン間では異なるユーザーとして扱われます。<br>
<br>
ただし、Active Directory連携をしている場合は、異なるドメインは仮想ドメインとして運用されます。そのため、＠から左側のアカウント（ユーザー名）が同じになってしまうと、同一ユーザーとして扱われますので、注意が必要です。<br>
