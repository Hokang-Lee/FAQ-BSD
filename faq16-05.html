<FONT SIZE="5" COLOR="#000000">複数の承認者を設定可能ですか？</FONT>
<HR>
<br>
可能です。<br>
既定値で２人の承認者を並列で設定することが可能です。設定された２人の承認者には、同じ内容の添付ファイルが付いた同じ承認依頼メールが自動送信されます。<br>
承認または却下は、どちらかの承認者が実行した操作が優先されます。後から取り消しすることはできません。<br>
なお、３人目の承認者、４人目の承認者を設定するには、用意されている設定方法によって可能になります。ただし、長いドメイン名や長いアカウント名では、状況によっては、設定そのものが困難なことがありますので、注意が必要です。<br>
