<FONT SIZE="5" COLOR="#000000"><b>メーリングリストで付加表題が文字化けする</b></FONT>
<HR>
<br>
メーリングリストで付加表題が文字化けするとき、次の点を確認してください。<br>
<br>
メーリングリストの詳細設定「付加表題＆カウント方法」の項目で、メーリングリストの挿入ヘッダに全角文字を使っていると、表題が文字化けする原因となります。挿入ヘッダに使う文字は通常、ASCII文字列での使用を推奨します。<br>
<br>
例えば、メーリングリストの付加表題を【ML 00x】 のように全角文字のかっこを指定してするのではなく、 [ML 00x] のように半角文字のかっこで指定するようにしてください。<br>
