<FONT SIZE="5" COLOR="#000000">APOPに対応していますか？ </FONT>
<HR>
<br>
対応しています。<br>
<br>
APOP認証を使うかどうかは、ユーザーごとに設定することが可能です。そのため、APOPに未対応のOutlook Expressを使っているユーザーは、APOPを使わない設定にし、その他のAPOP対応のメールクライアントソフトを使っているユーザーはAPOPを有効にする設定にすることができます。<br>
