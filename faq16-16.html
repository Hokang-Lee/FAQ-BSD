<FONT SIZE="5" COLOR="#000000">ユーザー数が多いとき簡単に承認パターンを設定する方法はありませんか？ </FONT>
<HR>
<br>
E-Post BossCheck Serverで上長承認の内容を設定するには、承認パターンを設定するファイル &quot;sender.dat&quot; をユーザー毎に記述する方法が通常ですが、ユーザーの数が多くなると、管理が煩雑になってしまいます。<br>
同じ承認パターンを適用できるユーザーがいる場合、該当ユーザーのメールボックスフォルダ内に承認パターンを設定するファイル &quot;sender.dat&quot; をそのままコピーする方法が使えます。<br>
