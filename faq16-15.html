<FONT SIZE="5" COLOR="#000000">承認を受ける側は、どんなメールが未承認状態なのか知る方法はありますか？</FONT>
<HR>
<br>
送信者、つまり承認を受ける側には、上長が承認か却下をするまで、送ったメールが承認前の保留状態にあることがわかるよう、保留通知メールが送信されます。<br>
また、送信者が未承認状態のメールを知るための機能は、件名：「waitmail_」のメールを自分宛に送信します。すると、承認待ちメールが添付される形で送信者本人に送られてきます。<br>
