<FONT SIZE="5" COLOR="#000000"><b>E-Postシリーズ製品での新元号への対応について</b></FONT><br>
<HR>
<br>
E-Postシリーズ製品での新元号への対応について以下の点を尋ねられることがあります。<br>
<ul><li>2019年5月1日以降に新元号に変わるが、E-Postシリーズ製品での影響の有無。<br>
<li>もし何らかの影響がある場合の対処方法。<br>
</ul>
これに対しては、E-Post V シリーズ製品はすべて、BSD系OS とサーバマシンのシステム日付（西暦）に依存しており、新元号・和暦についてはまったく関係がありません。<br>
したがって新元号に変わって以降に考えられる影響は何もありません。<br>
