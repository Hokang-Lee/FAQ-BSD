<FONT SIZE="5" COLOR="#000000">配送・送信可能な利用時間の設定はできますか？</FONT>
<HR>
<br>
配送・送信可能な利用時間の設定は可能です。<br>
まず個々のユーザーアカウント単位ごとに「利用時間設定」を行うことが可能です。<br>
<br>
一方、メールサーバ全体では、epstddサービスに関して送信許可時間の設定を行うことができます。配送時間をメールサーバ・SMTPサーバ全体で制御することが可能になっています。<br>
