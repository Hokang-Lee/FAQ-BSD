<FONT SIZE="5" COLOR="#000000"><b>マルチドメインと送信IPアドレスについて</b></FONT>
<HR>
<br>
1ドメインに1つのIPアドレスを対応づける設定でマルチドメイン設定を行った場合、受信時のIPアドレスは、ドメインごとに区別されるようになります。<br>
<br>
それに対し、送信時のIPアドレスについては、デフォルトのIPアドレスでしか送ることができません。<br>
送信時のIPアドレスに関しては、コンピュータのデフォルトIPでの送信となり、同一マシンで複数のドメイン別に送信IPを変更できる機能はありません。また、この仕様は変更することができません。<br>
