<FONT SIZE="5" COLOR="#000000"><b>Reply-To:ヘッダの追加がされない</b></FONT>
<HR>
<br>
以下の状況のとき、Reply-To:ヘッダは付加されません。<br>
<ol>
<li>受け付けたメールヘッダにReply-To:が既にある場合、Reply-To:ヘッダは付加されません。</li>
<li>Active Directoryのドメインコントローラにメールサーバを同居させるケースで、なおかつユーザー管理をWindows Accountと連携している場合、メーリングリストと同名のユーザーがドメインコントローラ・ドメインユーザーマネージャにも登録される結果となり、内部ユーザーアカウントとして判定されることから、Reply-To:ヘッダは付加されません。</li>
</ol>
