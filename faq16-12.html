<FONT SIZE="5" COLOR="#000000"><b>多段階の承認、たとえば課長が承認したことをさらに部長が承認するようなことが可能ですか？</b></FONT>
<HR>
<br>
多段階の承認については、現状は対応していません。システム的に複雑になりすぎるため、将来的にも予定はございません。<br>
どうしても多段階の承認が必要なケースは、E-Post BossCheck Serverを複数構築することで、実現することは可能です。<br>
