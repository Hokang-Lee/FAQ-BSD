<FONT SIZE="5" COLOR="#000000">特定のドメインやアカウント先を対象にした送信制限機能はありますか？ </FONT>
<HR>
<br>
E-Post Mail Server V シリーズ、E-Post SMTP Server V シリーズ製品では、特定のドメインやアカウント先を対象にした送信制限機能を持っています。<br>
<br>
送信許可を行う送信先を設定ファイル内に１行ごとに記述して設定します。記述方法には「*＠domain.co.jp」のようなワイルドカード指定も可能です。<br>
