<FONT SIZE="4" COLOR="#000000"><b>Active Directory（LDAP）連携で連携するのはアカウント＝ユーザーであり、メーリングリスト設定やエイリアス設定とは連携しないのか <font color="#ff0000">new!</font></b></FONT>
<HR>
<br>
Active Directory（LDAP）連携で同期・連携される対象は、基本的にアカウント＝ユーザーです。<br>
そのため、AD側の情報からE-Post側のメーリングリスト設定やエイリアス設定が同期・連携されることはありません。<br>
E-Post側でメーリングリスト、エイリアスの設定をしても、ActiveDirectory（LDAP）側への影響は何もありません。<br>
メーリングリストの設定はすべてE-Post側の操作で完結します。<br>
